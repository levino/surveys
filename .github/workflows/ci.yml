name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci --no-audit --no-fund
      - run: npm run build:css
      - name: Verify templ output is up to date
        run: |
          go run github.com/a-h/templ/cmd/templ@v0.2.793 generate
          git diff --exit-code -- ui/ || {
            echo "::error::ui/*_templ.go is stale — run 'templ generate' and commit."
            exit 1
          }
      - run: gofmt -l . | tee /tmp/fmt && test ! -s /tmp/fmt
      - run: go vet ./...
      - run: go test ./...

  image:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
